name: CI

on:
  push:
  pull_request:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install raylib
        run: brew install raylib
      - name: Build and test
        run: ./build/build.sh all
      - name: Sanitizers (ASan + UBSan)
        run: ./build/build.sh sanitize
      - name: Leak check
        run: ./build/build.sh leaks
      - name: Fuzz seed replay
        run: ./build/build.sh fuzz
